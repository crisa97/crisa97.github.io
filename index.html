<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="img/icons8-skull-48.png" type="image/x-icon">
    <title>Dork Tool</title>


</head>
<div id="toast"></div>

<body>

    <h1>☠️ Dork Tool And More ☠️</h1>

    <div class="container">

        <div class="tabs">
            <div class="tab active" onclick="showTab('dorks')">Dorks</div>
            <div class="tab" onclick="showTab('osint')">OSINT</div>
            <div class="tab" onclick="showTab('code')"> CODE</div>
        </div>

        <div class="container">
            <input type="text" id="domain" placeholder="test.com">
            <input type="text" id="filter" placeholder="filtrar...">

            <div id="results"></div>
        </div>

        <script>

            /* ================= DORKS ================= */
            const dorks = {

                /* RECON */
                "Recon": [
                    "site:{domain}",
                    "site:*.{domain} -www",
                    "site:*.*.{domain}",
                    "site:{domain} ext:php | ext:asp | ext:aspx | ext:jsp",
                    "site:{domain} inurl:test | dev | staging",
                    "site:{domain} inurl:beta"
                ],

                /* FILES */
                "Sensitive Files": [
                    "site:{domain} filetype:sql",
                    "site:{domain} filetype:log",
                    "site:{domain} filetype:bak",
                    "site:{domain} filetype:zip",
                    "site:{domain} filetype:tar",
                    "site:{domain} filetype:gz",
                    "site:{domain} filetype:env",
                    "site:{domain} filetype:env.local",
                    "site:{domain} inurl:.env",
                    "site:{domain} filetype:ini",
                    "site:{domain} filetype:conf",
                    "site:{domain} filetype:.conf",
                    "site:{domain} filetype:.yaml",
                    "site:{domain} filetype:.yml",
                    "site:{domain} filetype:json",
                    "site:{domain} filetype:.xml",
                    "site:{domain} filetype:.properties",
                    "site:{domain} filetype:.toml",
                ],

                /* DOCUMENTS */
                "Documents": [
                    "site:{domain} filetype:pdf",
                    "site:{domain} filetype:xlsx",
                    "site:{domain} filetype:docx",
                    "site:{domain} filetype:csv",
                    "site:{domain} filetype:xml",
                    "site:{domain} filetype:txt"
                ],

                /* DIRECTORY */
                "Directory Listing": [
                    "site:{domain} intitle:\"index of\"",
                    "site:{domain} intitle:\"index of\" \"backup\"",
                    "site:{domain} intitle:\"index of\" \"uploads\"",
                    "site:{domain} intitle:\"index of\" \".git\"",
                    "site:{domain} intitle:\"index of\" \"images\"",
                    "site:{domain} intitle:\"index of\" \"config\""
                ],

                /* CREDENTIALS */
                "Credentials": [
                    "site:{domain} intext:\"password=\"",
                    "site:{domain} intext:\"api_key\"",
                    "site:{domain} intext:\"access_token\"",
                    "site:{domain} intext:\"secret\"",
                    "site:{domain} intext:\"AWS_SECRET\"",
                    "site:{domain} intext:\"aws_access_key_id\"",
                    "site:{domain} intext:\"aws_secret_access_key\"",
                    "site:{domain} intext:\"db_password\""
                ],

                /* ADMIN */
                "Admin Panels": [
                    "site:{domain} inurl:admin",
                    "site:{domain} inurl:login",
                    "site:{domain} inurl:dashboard",
                    "site:{domain} intitle:\"admin panel\"",
                    "site:{domain} inurl:cpanel"
                ],

                /* DEBUG */
                "Debug": [
                    "site:{domain} inurl:debug",
                    "site:{domain} intext:\"stack trace\"",
                    "site:{domain} intext:\"error on line\"",
                    "site:{domain} intext:\"exception\""
                ],

                /* PARAMETERS */
                "Parameters": [
                    "site:{domain} inurl:\"?id=\"",
                    "site:{domain} inurl:\"?page=\"",
                    "site:{domain} inurl:\"?file=\"",
                    "site:{domain} inurl:\"?url=\"",
                    "site:{domain} inurl:\"?redirect=\"",
                    "site:{domain} inurl:\"?next=\"",
                    "site:{domain} inurl:\"user_id=\"",
                    "site:{domain} inurl:\"account=\""
                ],

                /* DATABASE */
                "Databases": [
                    // Panels
                    "site:{domain} intitle:\"phpMyAdmin\"",
                    "site:{domain} inurl:phpmyadmin",
                    "site:{domain} intitle:\"Adminer\"",
                    "site:{domain} inurl:adminer",

                    // SQL Errors
                    "site:{domain} intext:\"sql syntax near\"",
                    "site:{domain} intext:\"syntax error has occurred\"",
                    "site:{domain} intext:\"incorrect syntax near\"",
                    "site:{domain} intext:\"unexpected end of SQL command\"",
                    "site:{domain} intext:\"Warning: mysql_connect()\"",
                    "site:{domain} intext:\"Warning: mysql_query()\"",
                    "site:{domain} intext:\"Warning: pg_connect()\"",
                    "site:{domain} intext:\"ORA-01756\"",
                    "site:{domain} intext:\"SQLSTATE\"",

                    // Dumps & backups
                    "site:{domain} filetype:sql",
                    "site:{domain} filetype:bak \"sql\"",
                    "site:{domain} filetype:dump",
                    "site:{domain} filetype:backup",

                    // DB files
                    "site:{domain} filetype:db",
                    "site:{domain} filetype:sqlite",
                    "site:{domain} filetype:sqlite3",

                    // Config leaks
                    "site:{domain} intext:\"DB_PASSWORD\"",
                    "site:{domain} intext:\"DB_HOST\"",
                    "site:{domain} intext:\"DB_USERNAME\"",
                    "site:{domain} intext:\"database connection\"",

                    // Framework leaks
                    "site:{domain} intext:\"Laravel\" \"DB_\"",
                    "site:{domain} intext:\"Spring.datasource.password\"",
                    "site:{domain} intext:\"connectionString\""
                ],

                /* CLOUD */
                "Cloud": [
                    "site:s3.amazonaws.com \"{domain}\"",
                    "site:blob.core.windows.net \"{domain}\"",
                    "site:storage.googleapis.com \"{domain}\""
                ],

                /* BUCKET */
                "Buckets": [
                    "\"{domain}\" \"s3\"",
                    "\"{domain}\" \"bucket\"",
                    "\"{domain}\" \"aws\""
                ],

                /* GITHUB */
                "GitHub Leaks": [
                    "site:github.com \"{domain}\" password",
                    "site:github.com \"{domain}\" api_key",
                    "site:github.com \"{domain}\" secret",
                    "site:github.com \"{domain}\" .env"
                ],

                /* JS */
                "JavaScript": [
                    "site:{domain} filetype:js",
                    "site:{domain} inurl:main.js",
                    "site:{domain} inurl:app.js",
                    "site:{domain} intext:\"api\" filetype:js"
                ],

                /* DEV */
                "Dev / Staging": [
                    "site:{domain} inurl:dev",
                    "site:{domain} inurl:staging",
                    "site:{domain} inurl:qa",
                    "site:{domain} inurl:test"
                ],

                "Install / Setup": [
                    "site:{domain} inurl:readme",
                    "site:{domain} inurl:license",
                    "site:{domain} inurl:install",
                    "site:{domain} inurl:setup",
                    "site:{domain} inurl:config"
                ]

            };

            const resultsDiv = document.getElementById("results");
            const filterInput = document.getElementById("filter");

            document.getElementById("domain").addEventListener("input", render);
            filterInput.addEventListener("input", render);


            let currentTab = "dorks";
            let osintState = {
                crt: "",
                dns: "",
                ip: "",
                whois: ""
            };

            function showTab(tab) {
                currentTab = tab;
                document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
                event.target.classList.add("active");
                render();
            }
            clearOSINT();
            loadState();

            function render() {
                const domain = document.getElementById("domain").value;
                const filter = filterInput.value.toLowerCase();

                resultsDiv.innerHTML = "";

                if (currentTab === "dorks") {

                    if (!domain) {
                        resultsDiv.innerHTML = "<h2>⚠️ To use the tool, you must enter a domain</h2>";
                        return;
                    }

                    for (let category in dorks) {

                        const card = document.createElement("div");
                        card.className = "card";

                        const title = document.createElement("h3");
                        title.className = "category";
                        title.innerText = category + " (" + dorks[category].length + ")";
                        title.style.cursor = "pointer";

                        // contenedor oculto (submenu)
                        const content = document.createElement("div");
                        content.style.display = "none";

                        // toggle submenu
                        title.onclick = () => {
                            content.style.display = content.style.display === "none" ? "block" : "none";
                        };

                        dorks[category].forEach(dork => {

                            const final = dork.replace(/{domain}/g, domain);

                            if (!final.toLowerCase().includes(filter)) return;

                            const div = document.createElement("div");
                            div.className = "dork";

                            const text = document.createElement("div");
                            text.innerText = final;

                            const btnSearch = document.createElement("button");
                            btnSearch.innerText = "Search";
                            btnSearch.onclick = () => search(final);

                            const btnCopy = document.createElement("button");
                            btnCopy.innerText = "Copy";
                            btnCopy.onclick = () => copy(final);

                            div.appendChild(text);
                            div.appendChild(btnSearch);
                            div.appendChild(btnCopy);
                            content.appendChild(div);
                        });

                        card.appendChild(title);
                        card.appendChild(content);

                        if (content.children.length > 0) {
                            resultsDiv.appendChild(card);
                        }
                    }
                }

                if (currentTab === "osint") {

                    resultsDiv.innerHTML = "";

                    const modules = [
                        { name: "Subdomains (crt.sh)", key: "crt", action: "crt()" },
                        { name: "DNS Lookup", key: "dns", action: "dnsLookup()" },
                        { name: "IP Info", key: "ip", action: "ipInfo()" },
                        { name: "Whois", key: "whois", action: "whois()" }
                    ];

                    modules.forEach(mod => {

                        const card = document.createElement("div");
                        card.className = "card";

                        const title = document.createElement("h3");
                        title.className = "category";
                        title.innerText = mod.name;
                        title.style.cursor = "pointer";

                        const content = document.createElement("div");
                        content.style.display = "none";

                        // 🔥 mantener contenido previo
                        content.innerHTML = `
                            <button onclick="${mod.action}">Execute</button>
                            <button onclick="copyResult('${mod.key}Result')">Copy</button>
                            <div id="${mod.key}Result">${osintState[mod.key] || ""}</div>
                        `;

                        // toggle
                        title.onclick = () => {
                            content.style.display = content.style.display === "none" ? "block" : "none";
                        };

                        card.appendChild(title);
                        card.appendChild(content);
                        resultsDiv.appendChild(card);
                    });
                }

                if (currentTab === "code") {
                    const modules = [
                        { name: "Github", key: "gitgub", action: "github()", noOutput: true },
                        { name: "GitLab", key: "gitLab", action: "gitLab()", noOutput: true }
                    ];

                    modules.forEach(mod => {

                        const card = document.createElement("div");
                        card.className = "card";

                        const title = document.createElement("h3");
                        title.className = "category";
                        title.innerText = mod.name;
                        title.style.cursor = "pointer";

                        const content = document.createElement("div");
                        content.style.display = "none";

                        // 🔥 mantener contenido previo
                        if (mod.noOutput) {
                            content.innerHTML = `
                                <button onclick="${mod.action}">Search</button>
                            `;
                        } else {
                            content.innerHTML = `
                                <button onclick="${mod.action}">Ejecutar</button>
                                <button onclick="copyResult('${mod.key}Result')">Copiar</button>
                                <div id="${mod.key}Result">${osintState[mod.key] || ""}</div>
                            `;
                        }

                        // toggle
                        title.onclick = () => {
                            content.style.display = content.style.display === "none" ? "block" : "none";
                        };

                        card.appendChild(title);
                        card.appendChild(content);
                        resultsDiv.appendChild(card);
                    });
                }


            }

            function search(dork) {
                if (!dork) return;
                window.open("https://www.google.com/search?q=" + encodeURIComponent(dork), "_blank");
            }

            function copy(text) {
                navigator.clipboard.writeText(text)
                    .then(() => showToast("✅ Copy"))
                    .catch(() => showToast("❌ Error"));
            }

            function showToast(msg) {
                const toast = document.getElementById("toast");

                toast.innerText = msg;
                toast.style.opacity = "1";
                toast.style.transform = "translateY(0)";

                setTimeout(() => {
                    toast.style.opacity = "0";
                    toast.style.transform = "translateY(20px)";
                }, 1500);
            }


            async function crt() {
                const domain = document.getElementById("domain").value.trim();
                const output = document.getElementById("crtResult");

                // limpiar antes
                output.innerText = "";

                // 🔒 Validación: vacío
                if (!domain) {
                    output.innerText = "⚠️ Enter a domain first.";
                    return;
                }

                // 🔒 Validación: formato
                const domainRegex = /^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/;

                if (!domainRegex.test(domain)) {
                    output.innerText = "❌ Invalid domain (e.g., example.com)";
                    return;
                }

                try {
                    output.innerText = "⏳ Searching for subdomains...";

                    const res = await fetch(`https://crt.sh/?q=%25.${domain}&output=json`);
                    const data = await res.json();

                    if (!data || data.length === 0) {
                        output.innerText = "⚠️ No subdomains were found.";
                        return;
                    }

                    const subs = [...new Set(data.map(x => x.name_value))];
                    osintState.crt = subs.join("\n");
                    saveState();
                    output.innerText = osintState.crt;
                    document.getElementById("crtResult").innerText = osintState.crt;

                } catch (error) {
                    output.innerText = "❌ Error retrieving crt.sh";
                }
            }

            async function dnsLookup() {
                const domain = document.getElementById("domain").value.trim();
                const output = document.getElementById("dnsResult");

                if (!domain) {
                    output.innerText = "⚠️ Enter a domain";
                    return;
                }

                output.innerText = "⏳ Checking...";

                try {
                    const res = await fetch(`https://dns.google/resolve?name=${domain}`);
                    const data = await res.json();

                    if (!data.Answer) {
                        output.innerText = "❌ There are no DNS records";
                        return;
                    }

                    osintState.dns = data.Answer.map(a => a.data).join("\n");
                    saveState();
                    output.innerText = osintState.dns;

                } catch {
                    output.innerText = "❌ Error in DNS";
                }
            }


            async function ipInfo() {
                const domain = document.getElementById("domain").value.trim();
                const output = document.getElementById("ipResult");

                if (!domain) {
                    output.innerHTML = "⚠️ Enter a domain";
                    return;
                }

                output.innerHTML = "⏳ Resolving the IP address...";

                try {
                    const res = await fetch(`https://dns.google/resolve?name=${domain}`);
                    const data = await res.json();

                    const ip = data.Answer?.find(a => a.type === 1)?.data;

                    if (!ip) {
                        output.innerHTML = "❌ An IP address could not be obtained";
                        return;
                    }

                    const info = await fetch(`https://ipwho.is/${ip}`);
                    const ipData = await info.json();

                    // 🔒 evitar undefined
                    const country = ipData.country || "N/A";
                    const city = ipData.city || "N/A";
                    const isp = ipData.connection?.isp || "N/A";
                    const org = ipData.connection?.org || "N/A";
                    const asn = ipData.connection?.asn || "N/A";

                    const isCloudflare = org.toLowerCase().includes("cloudflare");
                    osintState.ip = `
                    🌐 Dominio: ${domain}
                    🧠 IP: ${ip}
                    🌍 País: ${country}
                    🏙️ Ciudad: ${city}
                    🏢 ISP: ${isp}
                    🏭 Organización: ${org}
                    🛰️ ASN: ${asn}
                    ${isCloudflare ? "⚠️ Protected by Cloudflare" : ""}
                    `;
                    saveState();
                    output.innerText = osintState.ip;
                } catch {
                    output.innerHTML = "❌ Error retrieving IP information";
                }
            }

            async function whois() {
                const domain = document.getElementById("domain").value.trim();
                const output = document.getElementById("whoisResult");

                if (!domain) {
                    output.innerText = "⚠️ Enter a domain";
                    return;
                }

                output.innerText = "⏳ Checking WHOIS (RDAP)...";

                try {
                    const res = await fetch(`https://rdap.org/domain/${domain}`);
                    const data = await res.json();

                    // 📅 fechas
                    const created = data.events?.find(e => e.eventAction === "registration")?.eventDate || "N/A";
                    const expires = data.events?.find(e => e.eventAction === "expiration")?.eventDate || "N/A";

                    // 🏢 registrar
                    const registrar = data.entities?.find(e => e.roles?.includes("registrar"));

                    // 👤 posible organización / nombre
                    let org = "N/A";
                    let name = "N/A";

                    if (registrar?.vcardArray) {
                        const vcard = registrar.vcardArray[1];

                        vcard.forEach(field => {
                            if (field[0] === "fn") name = field[3];
                            if (field[0] === "org") org = field[3];
                        });
                    }

                    // 🌐 nameservers
                    const ns = data.nameservers
                        ?.map(n => `- ${n.ldhName}`)
                        .join("\n") || "N/A";

                    // 📊 estados
                    const status = data.status?.join(", ") || "N/A";

                    osintState.whois =
                        "🌐 Dominio: " + data.ldhName + "\n\n" +
                        "🏢 Registrar: " + name + "\n" +
                        "🏭 Organización: " + org + "\n\n" +
                        "📅 Creado: " + created + "\n" +
                        "📅 Expira: " + expires + "\n\n" +
                        "🧾 Estado: " + status + "\n\n" +
                        "🌍 Nameservers:\n" +
                        ns;

                    saveState();

                    output.innerText = osintState.whois;

                } catch (error) {
                    output.innerText = "❌ Error retrieving RDAP";
                }
            }

            function copyResult(id) {
                const text = document.getElementById(id).innerText;

                if (!text) {
                    showToast("⚠️ Nothing to copy");
                    return;
                }

                navigator.clipboard.writeText(text)
                    .then(() => showToast("✅ Copy"))
                    .catch(() => showToast("❌ Error"));
            }

            function github() {
                const domain = document.getElementById("domain").value.trim();

                if (!domain) {
                    showToast("⚠️ Enter a domain");
                    return;
                }

                const query = `"${domain}"`;

                window.open(
                    "https://github.com/search?q=" + encodeURIComponent(query),
                    "_blank"
                );
            }

            function gitLab() {
                const domain = document.getElementById("domain").value.trim();

                if (!domain) {
                    showToast("⚠️ Enter a domain");
                    return;
                }

                const query = `${domain}`;

                window.open(
                    "https://gitlab.com/gitlab-com?filter=" + encodeURIComponent(query),
                    "_blank"
                );
            }

            function saveState() {
                localStorage.setItem("osintState", JSON.stringify(osintState));
            }

            function loadState() {
                const data = localStorage.getItem("osintState");
                if (data) {
                    osintState = JSON.parse(data);
                }
            }
            function clearOSINT() {
                localStorage.removeItem("osintState");
                osintState = { crt: "", dns: "", ip: "", whois: "" };
                render();
            }
        </script>

</body>

</html>
